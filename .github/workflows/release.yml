name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NIX_CONFIG: "experimental-features = nix-command flakes"

jobs:
  build:
    name: Build drag (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-darwin
            runner: macos-14
          - arch: x86_64-darwin
            runner: macos-13
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build
        run: nix build .#drag --print-build-logs --show-trace

      - name: Stage binary
        run: |
          mkdir -p staging
          cp result/bin/drag "staging/drag-${{ matrix.arch }}"
          chmod +x "staging/drag-${{ matrix.arch }}"

      - name: Generate checksum
        run: |
          cd staging
          shasum -a 256 drag-${{ matrix.arch }} > drag-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drag-${{ matrix.arch }}
          path: staging/
          retention-days: 90

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: drag-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/drag-*
